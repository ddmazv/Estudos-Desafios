<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Imersão</title>
    <link rel="icon" href="./assets/icons/favicon.png">
    <!--Styles-->
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="./Styles/home/home.css">
    <link rel="stylesheet" href="./Styles/sidebar left/sidebar_nav.css">
    <link rel="stylesheet" href="./Styles/sidebar left/library_sidebar.css">

    <!-- Links para trazer os ícones via CDN -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/solid.css"/>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/fontawesome.css"/>
</head>
<body>
    <div class="sidebar">
        <nav class="sidebar__navigation">
            <div class="logo">
                <a href="">
                    <img src="./assets/icons/logo-spotify.png" alt="logo-spotify">
                </a>
            </div>
            <div>
                <ul>
                    <li>
                        <a href="">
                            <span class="fa fa-home"></span>
                            <span>Início</span>
                        </a>
                    </li>
                    <li>
                        <a href="">
                            <span class="fa fa-search"></span>
                            <span>Buscar</span>
                        </a>
                    </li>
                </ul>
            </div>
        </nav>

        <nav class="sidebar__library">
            <div class="library__tittle">
                <a href="">
                    <span class="fa fa-record-vinyl"></span>
                    <span>Sua Biblioteca</span>
                </a>
            </div>
            <div class="library__tittle__plus__icons">
                <a href="">
                    <span class="fa fa-plus"></span>
                </a>
            </div>
            <div class="library__tittle__arrow__icons">
                <a href="">
                    <span class="fa fa-arrow-right"></span>
                </a>
            </div>
            
            <div class="playlists__button button__gray__background">
                <div class="button__tittle">
                    <a href="">
                        <span>Playlists</span>
                    </a>
                </div>
            </div>
        
        
            <div class="artists__button button__gray__background">
                <div class="button__tittle">
                    <a href="">
                        <span>Artistas</span>
                    </a>    
                </div>
            </div>
        
            <div class="albums__button button__gray__background">
                <div class="button__tittle">
                    <a href="">
                        <span>Álbuns</span>
                    </a>
                </div>
            </div>
            <div class="search__icon">
                <a href="">
                    <span class="fa fa-search"></span>
                </a>
            </div>

            <div class="recent">
                <a href="">
                    <span>Recentes</span>
                    <span class="fa fa-list-ul"></span>
                </a>
            </div>
            <div class="playlists">
               <ul>
                <li>

                    <div class="playlists__1">
                        <a href="">
                        <img src="assets/playlist/1.jpeg" alt="Capa da playlist">
                        <div class="playlist__text">
                            <span>Chrismas Hits</span>
                        </div>
                        <div class="playlist__subtext">
                            <div class="subtext__icon"><span class="fa fa-thumbtack"></span></div>
                            <div class="text">Playlist ● Spotify</div>
                        </div>
                        </a>
                    </div>

                </li>
               </ul>
            </div>
        </nav>

    </div>
</body>
</html>
